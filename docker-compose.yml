# Stock Index Futures Basis Tracker - Docker Compose
name: stock-index-basis-tracker
version: "3.8"

services:
  backend:
    build: ./backend
    container_name: sib-tracker-backend
    restart: unless-stopped
    volumes:
      # 持久化数据文件
      - ./backend/data.json:/app/data.json
      # 挂载前端目录（后端更新后同步 data.js 到前端）
      - ./frontend:/frontend:rw
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 60s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: sib-tracker-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro