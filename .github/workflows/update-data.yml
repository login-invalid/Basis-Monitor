name: Update Basis Data

on:
  schedule:
    # 每个交易日 16:30 北京时间 (UTC 08:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.13-akshare
          restore-keys: |
            pip-${{ runner.os }}-3.13-

      - name: Install dependencies
        run: pip install akshare pandas numpy

      - name: Generate data.js
        run: python scripts/generate_data_js.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/assets/data.js
          if git diff --cached --quiet; then
            echo "No data changes, skip commit."
          else
            git commit -m "auto: update data.js $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi